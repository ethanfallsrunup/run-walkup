// ─── QR Code ──────────────────────────────────────────────────────────────────
function qrUrl(text, size = 200) {
  return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&bgcolor=0D0D0D&color=FF6B35&qzone=1&format=png`;
}

// ─── Constants ────────────────────────────────────────────────────────────────
const COLORS = ["#FF6B35","#FFD700","#9B5DE5","#00C49A","#FF3D6B","#00B4D8","#F77F00","#06D6A0"];
const EMOJI_OPTIONS = ["🏃","🔥","⚡","🌙","🐅","🦅","💪","🎵","🚀","🌟","🏔️","⛰️","🌊","🦁","🐆","🎯","🏆","👟"];
const WEEK_DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const APP_URL = "https://run-walkup-s9kx.vercel.app/#submit";

function getWeekLabel() {
  const now = new Date();
  const start = new Date(now); start.setDate(now.getDate() - now.getDay() + 1);
  const end   = new Date(start); end.setDate(start.getDate() + 6);
  return `${start.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${end.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;
}

function pickRunner(runners, history) {
  const approved = runners.filter(r => r.approved);
  if (!approved.length) return null;
  const recent = history.slice(-approved.length).map(h => h.id);
  const pool = approved.filter(r => !recent.includes(r.id));
  return (pool.length ? pool : approved)[Math.floor(Math.random() * (pool.length || approved.length))];
}

// ─── Confetti ────────────────────────────────────────────────────────────────
function Confetti({ active }) {
  const pieces = active ? Array.from({length:55},(_,i)=>({
    id:i, x:Math.random()*100, color:COLORS[i%COLORS.length],
    size:Math.random()*10+5, dur:Math.random()*2+2, delay:Math.random()*0.6,
    drift:(Math.random()-0.5)*120, rot:Math.random()*720
  })) : [];
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999,overflow:"hidden"}}>
      {pieces.map(p=>(
        <div key={p.id} style={{
          position:"absolute",left:`${p.x}%`,top:"-20px",
          width:p.size,height:p.size,background:p.color,
          borderRadius:Math.random()>0.5?"50%":"2px",
          animation:`confettiFall ${p.dur}s ${p.delay}s ease-in forwards`,
          "--drift":`${p.drift}px`,"--rot":`${p.rot}deg`
        }}/>
      ))}
    </div>
  );
}

// ─── Share Card ───────────────────────────────────────────────────────────────
function ShareCard({ runner, weekLabel, onClose }) {
  const canvasRef = useRef();

  useEffect(() => {
    if (!runner || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const W=800,H=800;
    canvas.width=W; canvas.height=H;
    ctx.fillStyle="#0D0D0D"; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle="#1A1A1A"; ctx.lineWidth=1;
    for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    const grad=ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,"transparent");grad.addColorStop(0.5,runner.color);grad.addColorStop(1,"transparent");
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,6);
    ctx.font="bold 13px monospace"; ctx.fillStyle="#444"; ctx.textAlign="left"; ctx.fillText("RUN WALK-UP",48,60);
    ctx.font="12px monospace"; ctx.fillStyle="#333"; ctx.fillText(weekLabel.toUpperCase(),48,82);
    ctx.font="140px serif"; ctx.textAlign="center"; ctx.fillText(runner.emoji,W/2,340);
    ctx.font="bold 15px monospace"; ctx.fillStyle=runner.color; ctx.fillText("THIS WEEK'S RUNNER",W/2,410);
    ctx.font="bold 68px sans-serif"; ctx.fillStyle="#F5F0E8"; ctx.fillText(runner.name.toUpperCase(),W/2,490);
    ctx.fillStyle=runner.color; ctx.fillRect(W/2-30,510,60,3);
    ctx.font="bold 32px sans-serif"; ctx.fillStyle=runner.color; ctx.fillText(`♪  ${runner.song.toUpperCase()}`,W/2,558);
    ctx.font="18px sans-serif"; ctx.fillStyle="#666"; ctx.fillText(`by ${runner.artist}`,W/2,590);
    ctx.font="bold 11px monospace"; ctx.fillStyle="#2A2A2A"; ctx.fillText("FLEET FEET RUN CREW",W/2,H-40);
    ctx.fillStyle=grad; ctx.fillRect(0,H-6,W,6);
  },[runner,weekLabel]);

  function download() {
    const link=document.createElement("a");
    link.download=`walkup-${runner.name.replace(/\s/g,"-")}.png`;
    link.href=canvasRef.current.toDataURL(); link.click();
  }
  function shareWhatsApp() {
    const txt=`🎵 *RUN WALK-UP — THIS WEEK'S RUNNER* 🎵

${runner.emoji} *${runner.name}* drops in with:
🎶 _${runner.song}_ by ${runner.artist}

See you on the trails! 🏔️🏃`;
    window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`,"_blank");
  }
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#111",border:"1px solid #333",maxWidth:520,width:"100%",padding:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:4,color:"#FF6B35"}}>SHARE CARD</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#666",fontSize:22,cursor:"pointer"}}>✕</button>
        </div>
        <canvas ref={canvasRef} style={{width:"100%",borderRadius:2,display:"block",marginBottom:16}}/>
        <div style={{display:"flex",gap:10}}>
          <button onClick={shareWhatsApp} style={{flex:1,background:"#25D366",color:"#fff",border:"none",padding:"12px",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:3,cursor:"pointer"}}>
            💬 WHATSAPP
          </button>
          <button onClick={download} style={{background:"#1A1A1A",border:"1px solid #333",color:"#F5F0E8",padding:"12px 20px",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,cursor:"pointer"}}>
            ↓ SAVE
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Spotify / iTunes Search ──────────────────────────────────────────────────
function SongSearch({ onSelect, initialQuery="" }) {
  const [query,setQuery]=useState(initialQuery);
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const [searched,setSearched]=useState(false);
  async function search() {
    if(!query.trim())return;
    setLoading(true);setSearched(true);
    try{
      const res=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=6`);
      const data=await res.json();
      setResults(data.results||[]);
    }catch{setResults([]);}
    setLoading(false);
  }
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()}
          placeholder="Search song or artist…"
          style={{flex:1,background:"#0D0D0D",border:"1px solid #333",color:"#F5F0E8",padding:"9px 14px",fontFamily:"'DM Sans',sans-serif",fontSize:14,outline:"none"}}/>
        <button onClick={search} style={{background:"#FF6B35",border:"none",color:"#000",padding:"9px 18px",fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:2,cursor:"pointer"}}>
          {loading?"…":"FIND"}
        </button>
      </div>
      {searched&&!loading&&results.length===0&&<div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#555",padding:"8px 0"}}>No results — try different keywords.</div>}
      <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:240,overflowY:"auto"}}>
        {results.map((t,i)=>(
          <button key={i} onClick={()=>onSelect({song:t.trackName,artist:t.artistName,previewUrl:t.previewUrl||""})}
            style={{background:"#0D0D0D",border:"1px solid #222",padding:"10px 14px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#FF6B35"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#222"}>
            {t.artworkUrl60&&<img src={t.artworkUrl60} alt="" style={{width:40,height:40,borderRadius:2,flexShrink:0}}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:1,color:"#F5F0E8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.trackName}</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#666"}}>{t.artistName}</div>
            </div>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,color:"#FF6B35",flexShrink:0}}>SELECT</span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── Audio Preview Bar ────────────────────────────────────────────────────────
function AudioBar({ previewUrl, trackName, artist, color }) {
  const audioRef=useRef();
  const [playing,setPlaying]=useState(false);
  const [progress,setProgress]=useState(0);
  useEffect(()=>{setPlaying(false);setProgress(0);},[previewUrl]);
  function toggle(){if(!audioRef.current)return;if(playing){audioRef.current.pause();setPlaying(false);}else{audioRef.current.play();setPlaying(true);}}
  if(!previewUrl)return null;
  return(
    <div style={{background:"#0D0D0D",border:`1px solid ${color}33`,padding:"12px 16px",display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
      <audio ref={audioRef} src={previewUrl} onTimeUpdate={()=>setProgress(audioRef.current.currentTime/audioRef.current.duration*100||0)} onEnded={()=>{setPlaying(false);setProgress(0);}}/>
      <button onClick={toggle} style={{width:36,height:36,borderRadius:"50%",background:color,border:"none",cursor:"pointer",fontSize:14,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{playing?"⏸":"▶"}</button>
      <div style={{flex:1}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,color:"#F5F0E8"}}>{trackName}</div>
        <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#555",marginBottom:5}}>{artist} · 30s preview</div>
        <div style={{background:"#1E1E1E",height:3,borderRadius:2}}>
          <div style={{background:color,height:"100%",width:`${progress}%`,borderRadius:2,transition:"width .3s"}}/>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
export default function App() {
  const [view,setView]=useState("home");
  const [runners,setRunners]=useState([]);
  const [pending,setPending]=useState([]);
  const [history,setHistory]=useState([]);
  const [featured,setFeatured]=useState(null);
  const [loading,setLoading]=useState(true);
  const [confettiOn,setConfettiOn]=useState(false);
  const [showShare,setShowShare]=useState(false);
  const [showQR,setShowQR]=useState(false);
  const [scheduleMap,setScheduleMap]=useState({});
  const [showAddForm,setShowAddForm]=useState(false);
  const [editTarget,setEditTarget]=useState(null);
  const [form,setForm]=useState({name:"",song:"",artist:"",emoji:"🏃",color:COLORS[0],previewUrl:""});
  const [showSongSearch,setShowSongSearch]=useState(false);
  const [subForm,setSubForm]=useState({name:"",song:"",artist:"",emoji:"🏃",color:COLORS[0],previewUrl:""});
  const [subSongSearch,setSubSongSearch]=useState(false);
  const [submitted,setSubmitted]=useState(false);
  const weekLabel=getWeekLabel();

  // ── Load all data from Supabase on mount ──
  useEffect(()=>{
    async function loadAll(){
      setLoading(true);
      const [{data:rData},{data:sData},{data:hData},{data:scData}] = await Promise.all([
        sb.from("runners").select("*").eq("approved",true).order("created_at"),
        sb.from("submissions").select("*").eq("approved",false).order("created_at"),
        sb.from("history").select("*").order("picked_at"),
        sb.from("schedule").select("*"),
      ]);
      const rs = (rData||[]).map(r=>({...r,previewUrl:r.preview_url}));
      const ps = (sData||[]).map(r=>({...r,previewUrl:r.preview_url}));
      const hs = (hData||[]).map(h=>({...h,date:new Date(h.picked_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}));
      const sc = {};
      (scData||[]).forEach(s=>{ sc[s.day]={id:s.runner_id,name:s.runner_name,song:s.song,emoji:s.emoji,color:s.color}; });
      setRunners(rs);
      setPending(ps);
      setHistory(hs);
      setScheduleMap(sc);
      if(rs.length) setFeatured(rs[0]);
      setLoading(false);
    }
    loadAll();
  },[]);

  async function firePick(){
    const pick=pickRunner(runners,history);
    if(!pick)return;
    setFeatured(pick);
    const newH={id:pick.id,name:pick.name,song:pick.song,artist:pick.artist,emoji:pick.emoji,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})};
    setHistory(h=>[...h,newH]);
    setConfettiOn(true); setTimeout(()=>setConfettiOn(false),3200);
    await sb.from("history").insert({runner_id:pick.id,runner_name:pick.name,song:pick.song,artist:pick.artist,emoji:pick.emoji});
  }

  async function saveRunner(){
    if(!form.name.trim()||!form.song.trim())return;
    if(editTarget){
      await sb.from("runners").update({name:form.name,song:form.song,artist:form.artist,emoji:form.emoji,color:form.color,preview_url:form.previewUrl}).eq("id",editTarget.id);
      setRunners(rs=>rs.map(r=>r.id===editTarget.id?{...r,...form}:r));
      setEditTarget(null);
    } else {
      const {data}=await sb.from("runners").insert({name:form.name,song:form.song,artist:form.artist,emoji:form.emoji,color:form.color,preview_url:form.previewUrl,approved:true}).select().single();
      if(data) setRunners(rs=>[...rs,{...data,previewUrl:data.preview_url}]);
    }
    setForm({name:"",song:"",artist:"",emoji:"🏃",color:COLORS[0],previewUrl:""});
    setShowAddForm(false);setShowSongSearch(false);
  }

  function startEdit(runner){
    setEditTarget(runner);
    setForm({name:runner.name,song:runner.song,artist:runner.artist,emoji:runner.emoji,color:runner.color,previewUrl:runner.previewUrl||""});
    setShowAddForm(true);setShowSongSearch(false);setView("roster");
  }

  async function deleteRunner(id){
    await sb.from("runners").delete().eq("id",id);
    setRunners(rs=>rs.filter(r=>r.id!==id));
    if(featured?.id===id)setFeatured(null);
  }

  async function approvePending(p){
    const {data}=await sb.from("runners").insert({name:p.name,song:p.song,artist:p.artist,emoji:p.emoji,color:p.color,preview_url:p.previewUrl,approved:true}).select().single();
    await sb.from("submissions").delete().eq("id",p.id);
    if(data) setRunners(rs=>[...rs,{...data,previewUrl:data.preview_url}]);
    setPending(ps=>ps.filter(x=>x.id!==p.id));
  }

  async function submitSong(){
    if(!subForm.name.trim()||!subForm.song.trim())return;
    const {data}=await sb.from("submissions").insert({name:subForm.name,song:subForm.song,artist:subForm.artist,emoji:subForm.emoji,color:subForm.color,preview_url:subForm.previewUrl,approved:false}).select().single();
    if(data) setPending(ps=>[...ps,{...data,previewUrl:data.preview_url}]);
    setSubForm({name:"",song:"",artist:"",emoji:"🏃",color:COLORS[0],previewUrl:""});
    setSubmitted(true);setTimeout(()=>setSubmitted(false),4000);
  }

  async function assignSchedule(day,runner){
    await sb.from("schedule").upsert({day,runner_id:runner.id,runner_name:runner.name,song:runner.song,emoji:runner.emoji,color:runner.color},{onConflict:"day"});
    setScheduleMap(m=>({...m,[day]:runner}));
  }

  async function removeSchedule(day){
    await sb.from("schedule").delete().eq("day",day);
    setScheduleMap(m=>{const n={...m};delete n[day];return n;});
  }

  if(loading) return(
    <div style={{minHeight:"100vh",background:"#0A0A0A",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:48}}>🎵</div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:6,color:"#FF6B35"}}>LOADING...</div>
      <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#444"}}>Connecting to database</div>
    </div>
  );

  const spotifyQ=featured?encodeURIComponent(`${featured.song} ${featured.artist}`):"";

  return(
    <div style={{fontFamily:"'Bebas Neue',Impact,sans-serif",minHeight:"100vh",background:"#0A0A0A",color:"#F5F0E8",position:"relative"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        @keyframes confettiFall{to{transform:translateY(110vh) translateX(var(--drift)) rotate(var(--rot));opacity:0;}}
        @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes glowPop{0%{box-shadow:0 0 0 0 rgba(255,107,53,.7)}100%{box-shadow:0 0 0 32px rgba(255,107,53,0)}}
        .slide-up{animation:slideUp .35s ease-out;}
        .body{font-family:'DM Sans',sans-serif;}
        .nav-btn{background:none;border:none;cursor:pointer;padding:10px 14px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:#555;transition:color .2s;position:relative;}
        .nav-btn.active{color:#FF6B35;}
        .nav-btn.active::after{content:'';position:absolute;bottom:0;left:14px;right:14px;height:2px;background:#FF6B35;}
        .nav-btn:hover:not(.active){color:#999;}
        .btn-primary{background:#FF6B35;color:#0A0A0A;border:none;padding:12px 28px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;transition:all .2s;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));}
        .btn-primary:hover{background:#FF8C5A;transform:translateY(-1px);}
        .btn-ghost{background:none;border:1px solid #2A2A2A;color:#777;padding:10px 18px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .2s;}
        .btn-ghost:hover{border-color:#FF6B35;color:#FF6B35;}
        .btn-green{background:#25D366;color:#fff;border:none;padding:12px 20px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;}
        .btn-qr{background:#1A1A1A;border:1px solid #333;color:#F5F0E8;padding:12px 20px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;}
        .btn-qr:hover{border-color:#FF6B35;color:#FF6B35;}
        .input{background:#0D0D0D;border:1px solid #2A2A2A;color:#F5F0E8;padding:10px 14px;width:100%;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
        .input:focus{border-color:#FF6B35;}
        .input::placeholder{color:#444;}
        .emoji-btn{background:#111;border:1px solid #222;padding:6px 9px;cursor:pointer;font-size:18px;transition:all .15s;border-radius:4px;}
        .emoji-btn:hover,.emoji-btn.sel{border-color:#FF6B35;background:#1E1009;}
        .badge{display:inline-block;padding:2px 10px;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:2px;}
        .badge-orange{background:#FF6B3522;color:#FF6B35;border:1px solid #FF6B3544;}
        .badge-green{background:#06D6A022;color:#06D6A0;border:1px solid #06D6A044;}
        select.input{appearance:none;}
        ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#111;}::-webkit-scrollbar-thumb{background:#333;}
      `}</style>

      <Confetti active={confettiOn}/>
      {showShare&&<ShareCard runner={featured} weekLabel={weekLabel} onClose={()=>setShowShare(false)}/>}
      {showQR&&<QRModal onClose={()=>setShowQR(false)}/>}

      {/* ── Nav ── */}
      <div style={{borderBottom:"1px solid #161616",display:"flex",alignItems:"stretch",justifyContent:"space-between",padding:"0 20px",position:"sticky",top:0,background:"#0A0A0A",zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"13px 0"}}>
          <span style={{fontSize:20}}>🎵</span>
          <span style={{fontSize:19,letterSpacing:5,color:"#FF6B35"}}>RUN</span>
          <span style={{fontSize:19,letterSpacing:5}}>WALK-UP</span>

        </div>
        <div style={{display:"flex"}}>
          {["home","roster","submit","schedule","history"].map(v=>(
            <button key={v} className={`nav-btn${view===v?" active":""}`} onClick={()=>setView(v)}>
              {v==="submit"?"SUBMIT":v.toUpperCase()}
            </button>
          ))}
          {/* QR button always visible in nav */}
          <button className="btn-qr" style={{margin:"8px 0 8px 8px",padding:"6px 14px",fontSize:13}} onClick={()=>setShowQR(true)}>
            <span style={{fontSize:16}}>⬛</span> QR
          </button>

      </div>

      <div style={{maxWidth:680,margin:"0 auto",padding:"30px 20px"}}>

        {/* ══ HOME ══ */}
        {view==="home"&&(
          <div className="slide-up">
            <div style={{textAlign:"center",marginBottom:26}}>
              <div className="body" style={{fontSize:11,letterSpacing:6,color:"#FF6B35",marginBottom:4}}>THIS WEEK'S FEATURED RUNNER</div>
              <div className="body" style={{fontSize:11,letterSpacing:2,color:"#3A3A3A"}}>{weekLabel}</div>
            </div>
            {featured?(<>
              <div style={{background:"#111",border:`2px solid ${featured.color}`,padding:"34px 24px",textAlign:"center",marginBottom:14,position:"relative",animation:"glowPop .6s ease-out"}}>
                <div style={{position:"absolute",top:-1,left:0,right:0,height:3,background:`linear-gradient(90deg,transparent,${featured.color},transparent)`}}/>
                <div style={{fontSize:76,marginBottom:10}}>{featured.emoji}</div>
                <div style={{fontSize:44,letterSpacing:4,marginBottom:4}}>{featured.name}</div>
                <div style={{width:36,height:2,background:featured.color,margin:"0 auto 16px"}}/>
                <div style={{fontSize:28,letterSpacing:2,color:featured.color,marginBottom:4}}>{featured.song}</div>
                <div className="body" style={{color:"#555",fontSize:14,marginBottom:22}}>by {featured.artist}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"center"}}>
                  <a href={`https://open.spotify.com/search/${spotifyQ}`} target="_blank" rel="noopener noreferrer"
                    style={{background:"#1DB954",color:"#000",padding:"10px 20px",textDecoration:"none",fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:2}}>▶ SPOTIFY</a>
                  <a href={`https://music.apple.com/search?term=${spotifyQ}`} target="_blank" rel="noopener noreferrer"
                    style={{background:"#FC3C44",color:"#fff",padding:"10px 20px",textDecoration:"none",fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:2}}>♪ APPLE MUSIC</a>

              {featured.previewUrl&&<AudioBar previewUrl={featured.previewUrl} trackName={featured.song} artist={featured.artist} color={featured.color}/>}
              <div style={{display:"flex",gap:8,marginBottom:28,flexWrap:"wrap"}}>
                <button className="btn-primary" onClick={firePick}>🎲 PICK NEW RUNNER</button>
                <button className="btn-green" onClick={()=>setShowShare(true)}>💬 WHATSAPP</button>
                <button className="btn-qr" onClick={()=>setShowQR(true)}>⬛ QR CODE</button>
                <button className="btn-ghost" onClick={()=>setView("roster")}>ROSTER</button>
              </div>
            </>):(
              <div style={{background:"#111",border:"1px dashed #2A2A2A",padding:48,textAlign:"center",marginBottom:24}}>
                <div className="body" style={{color:"#444",fontSize:14}}>No approved runners yet.</div>
              </div>
            )}
            {runners.filter(r=>r.approved).length>0&&(
              <div>
                <div className="body" style={{fontSize:11,letterSpacing:4,color:"#252525",marginBottom:10}}>FULL ROSTER</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {runners.filter(r=>r.approved).map(r=>(
                    <div key={r.id} style={{background:"#111",border:`1px solid ${r.id===featured?.id?r.color:"#1E1E1E"}`,padding:"5px 14px",display:"flex",alignItems:"center",gap:6}}>
                      <span>{r.emoji}</span>
                      <span className="body" style={{fontSize:13,color:r.id===featured?.id?r.color:"#666"}}>{r.name}</span>
                    </div>
                  ))}
                </div>
              </div>

              </div>
              <button className="btn-primary" onClick={()=>{setEditTarget(null);setForm({name:"",song:"",artist:"",emoji:"🏃",color:COLORS[0],previewUrl:""});setShowAddForm(true);setShowSongSearch(false);}}>+ ADD</button>
            </div>
            {showAddForm&&(
              <div style={{background:"#111",border:"1px solid #FF6B35",padding:20,marginBottom:18}}>

                    <input className="input" placeholder="Song title" value={form.song} onChange={e=>setForm(f=>({...f,song:e.target.value}))}/>
                  </div>
                </div>
                {showSongSearch&&<div style={{background:"#0D0D0D",border:"1px solid #222",padding:12,marginBottom:10}}><SongSearch initialQuery={form.song} onSelect={({song,artist,previewUrl})=>{setForm(f=>({...f,song,artist,previewUrl:previewUrl||""}));setShowSongSearch(false);}}/></div>}
                {!showSongSearch&&<div style={{marginBottom:10}}><div className="body" style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:4}}>ARTIST</div><input className="input" placeholder="Artist" value={form.artist} onChange={e=>setForm(f=>({...f,artist:e.target.value}))}/></div>}
                {form.previewUrl&&<AudioBar previewUrl={form.previewUrl} trackName={form.song} artist={form.artist} color={form.color}/>}
                <div style={{marginBottom:10}}><div className="body" style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:6}}>EMOJI</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{EMOJI_OPTIONS.map(em=><button key={em} className={`emoji-btn${form.emoji===em?" sel":""}`} onClick={()=>setForm(f=>({...f,emoji:em}))}>{em}</button>)}</div></div>
                <div style={{marginBottom:16}}><div className="body" style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:6}}>COLOR</div><div style={{display:"flex",gap:8}}>{COLORS.map(c=><button key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{width:24,height:24,borderRadius:"50%",background:c,border:form.color===c?"2px solid #fff":"2px solid transparent",cursor:"pointer"}}/>)}</div></div>
                <div style={{display:"flex",gap:8}}><button className="btn-primary" onClick={saveRunner}>SAVE</button><button className="btn-ghost" onClick={()=>{setShowAddForm(false);setEditTarget(null);}}>CANCEL</button></div>

            )}
            {pending.length>0&&(

                      <button className="btn-primary" style={{padding:"6px 14px",fontSize:13}} onClick={()=>approvePending(p)}>✓ APPROVE</button>

            <div style={{display:"flex",flexDirection:"column",gap:6}}>

                  <span style={{fontSize:26}}>{r.emoji}</span>
                  <div style={{flex:1}}><div style={{fontSize:17,letterSpacing:2,color:r.id===featured?.id?r.color:"#F5F0E8"}}>{r.name}</div><div className="body" style={{fontSize:12,color:"#444"}}>{r.song}{r.artist?` · ${r.artist}`:""}</div></div>
                  {r.id===featured?.id&&<span className="badge badge-orange">FEATURED</span>}

                    <button className="btn-ghost" style={{padding:"4px 10px",fontSize:12}} onClick={()=>startEdit(r)}>EDIT</button>
                    <button className="btn-ghost" style={{padding:"4px 9px",fontSize:12,borderColor:"#FF3D6B",color:"#FF3D6B"}} onClick={()=>deleteRunner(r.id)}>✕</button>
                  </div>

        {/* ══ SUBMIT ══ */}
        {view==="submit"&&(
          <div className="slide-up">
            <div style={{marginBottom:24}}>
              <div style={{fontSize:26,letterSpacing:4}}>SUBMIT YOUR SONG</div>
              <div className="body" style={{color:"#555",fontSize:13,marginTop:4}}>Tell us what track gets you moving — we'll add it to the rotation.</div>
            </div>

            {/* QR shortcut banner */}
            <div style={{background:"#111",border:"1px solid #1E1E1E",padding:"14px 18px",display:"flex",alignItems:"center",gap:14,marginBottom:22,cursor:"pointer"}} onClick={()=>setShowQR(true)}>
              <div style={{background:"#1A1A1A",padding:10,border:"1px solid #2A2A2A"}}>
                <img src={qrUrl(APP_URL,60)} alt="QR" style={{display:"block",width:60,height:60}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,letterSpacing:3,marginBottom:3}}>SHARE THIS PAGE</div>
                <div className="body" style={{fontSize:12,color:"#555"}}>Show runners this QR code so they can submit from their own phone</div>
              </div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,color:"#FF6B35",letterSpacing:2}}>VIEW →</div>
            </div>

            {submitted?(
              <div style={{background:"#06D6A011",border:"1px solid #06D6A044",padding:36,textAlign:"center"}}>
                <div style={{fontSize:44,marginBottom:10}}>🎉</div>
                <div style={{fontSize:22,letterSpacing:4,color:"#06D6A0",marginBottom:6}}>SUBMITTED!</div>
                <div className="body" style={{color:"#555",fontSize:13}}>Your song is in the queue — approval coming soon. See you on the trails!</div>
              </div>
            ):(
              <div style={{background:"#111",border:"1px solid #1E1E1E",padding:22}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                  <div><div className="body" style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:4}}>YOUR NAME *</div><input className="input" placeholder="First & last" value={subForm.name} onChange={e=>setSubForm(f=>({...f,name:e.target.value}))}/></div>
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <span className="body" style={{fontSize:10,letterSpacing:2,color:"#555"}}>WALK-UP SONG *</span>
                      <button onClick={()=>setSubSongSearch(s=>!s)} style={{background:"none",border:"none",color:"#FF6B35",fontFamily:"'Bebas Neue',sans-serif",fontSize:11,letterSpacing:2,cursor:"pointer"}}>{subSongSearch?"MANUAL":"🔍 SEARCH"}</button>
                    </div>
                    <input className="input" placeholder="Song title" value={subForm.song} onChange={e=>setSubForm(f=>({...f,song:e.target.value}))}/>
                  </div>
                </div>
                {subSongSearch&&<div style={{background:"#0D0D0D",border:"1px solid #222",padding:12,marginBottom:10}}><SongSearch initialQuery={subForm.song} onSelect={({song,artist,previewUrl})=>{setSubForm(f=>({...f,song,artist,previewUrl:previewUrl||""}));setSubSongSearch(false);}}/></div>}
                {!subSongSearch&&<div style={{marginBottom:10}}><div className="body" style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:4}}>ARTIST</div><input className="input" placeholder="Artist name" value={subForm.artist} onChange={e=>setSubForm(f=>({...f,artist:e.target.value}))}/></div>}
                {subForm.previewUrl&&<AudioBar previewUrl={subForm.previewUrl} trackName={subForm.song} artist={subForm.artist} color="#FF6B35"/>}
                <div style={{marginBottom:10}}><div className="body" style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:6}}>YOUR EMOJI</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{EMOJI_OPTIONS.map(em=><button key={em} className={`emoji-btn${subForm.emoji===em?" sel":""}`} onClick={()=>setSubForm(f=>({...f,emoji:em}))}>{em}</button>)}</div></div>
                <div style={{marginBottom:18}}><div className="body" style={{fontSize:10,letterSpacing:2,color:"#555",marginBottom:6}}>PICK A COLOR</div><div style={{display:"flex",gap:8}}>{COLORS.map(c=><button key={c} onClick={()=>setSubForm(f=>({...f,color:c}))} style={{width:24,height:24,borderRadius:"50%",background:c,border:subForm.color===c?"2px solid #fff":"2px solid transparent",cursor:"pointer"}}/>)}</div></div>
                <button className="btn-primary" onClick={submitSong}>🎵 SUBMIT MY SONG</button>
              </div>
            )}
          </div>
        )}

        {/* ══ SCHEDULE ══ */}
        {view==="schedule"&&(
          <div className="slide-up">
            <div style={{marginBottom:20}}><div style={{fontSize:26,letterSpacing:4}}>SCHEDULE</div><div className="body" style={{color:"#444",fontSize:13}}>Assign runners to run days</div></div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {WEEK_DAYS.map(day=>{
                const a=scheduleMap[day];
                return(
                  <div key={day} style={{background:"#111",border:`1px solid ${a?a.color+"44":"#1A1A1A"}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{fontSize:15,letterSpacing:3,width:48,color:a?a.color:"#2A2A2A",flexShrink:0}}>{day.slice(0,3).toUpperCase()}</div>
                    <div style={{flex:1}}>
                      {a?(
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:20}}>{a.emoji}</span>
                          <div><div style={{fontSize:15,letterSpacing:2,color:a.color}}>{a.name}</div><div className="body" style={{fontSize:11,color:"#444"}}>{a.song}</div></div>
                        </div>
                      ):<span className="body" style={{color:"#2A2A2A",fontSize:13}}>Unassigned</span>}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {a&&<button className="btn-ghost" style={{padding:"4px 9px",fontSize:11,borderColor:"#FF3D6B",color:"#FF3D6B"}} onClick={()=>removeSchedule(day)}>✕</button>}
                      <select className="input" style={{width:"auto",padding:"5px 10px",fontSize:12,background:"#0D0D0D"}} value="" onChange={e=>{const r=runners.find(x=>x.id===Number(e.target.value));if(r)assignSchedule(day,r);}}>
                        <option value="">Assign…</option>
                        {runners.filter(r=>r.approved).map(r=><option key={r.id} value={r.id}>{r.emoji} {r.name}</option>)}
                      </select>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ══ HISTORY ══ */}
        {view==="history"&&(
          <div className="slide-up">
            <div style={{marginBottom:20}}><div style={{fontSize:26,letterSpacing:4}}>HISTORY</div><div className="body" style={{color:"#444",fontSize:13}}>{history.length} picks so far</div></div>
            {history.length===0?(
              <div className="body" style={{color:"#333",fontSize:14,padding:"40px 0",textAlign:"center"}}>No picks yet — go to Home and pick your first runner!</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {[...history].reverse().map((h,i)=>(
                  <div key={i} style={{background:"#111",border:"1px solid #161616",padding:"11px 16px",display:"flex",alignItems:"center",gap:12}}>
                    <div className="body" style={{color:"#2A2A2A",fontSize:12,width:86,flexShrink:0}}>{h.date}</div>
                    <span style={{fontSize:20}}>{h.emoji}</span>
                    <div style={{flex:1}}><div style={{fontSize:16,letterSpacing:2}}>{h.name}</div><div className="body" style={{fontSize:11,color:"#444"}}>{h.song}{h.artist?` · ${h.artist}`:""}</div></div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

      </div>

      <div style={{textAlign:"center",padding:"18px",borderTop:"1px solid #111",marginTop:20}}>
        <span className="body" style={{fontSize:10,color:"#222",letterSpacing:4}}>RUN WALK-UP · FLEET FEET RUN CREW</span>
      </div>
    </div>
  );
}

const { useState, useRef, useEffect, useCallback } = React;
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
